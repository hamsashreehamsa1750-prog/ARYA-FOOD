<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Item Website</title>
    <link rel="stylesheet" href="../css/style.css">


</head>
<body>

<!-- ===== HEADER ===== -->
<header>
    <div class="logo">ARYA ZONE</div>
    <img src="../image/arya.jpeg">
    <nav>
        <a href="home">Home</a>
        <a href="../index/menu.html">Menu</a>
        <a href="../index/about.html">About</a>
        <a href="../index/contact.html">Contact</a>
    </nav>
</header>

<!-- ===== HERO SECTION ===== -->
<section id="home" class="hero">
    <center><h1>ARYA CAFE CENTER</h1></center>
    <p>Fresh • Tasty • Affordable</p>
    <button onclick="openPopup()">Order Now</button>
</section>
<!-- ===== ORDER POPUP ===== -->
<div id="orderPopup" class="popup">
    <div class="popup-content">
        <h2>Place Your Order</h2>

        <label>Choose Food:</label>
        <select id="foodItem">
            <option>Burger</option>
            <option>Pizza</option>
            <option>Sandwich</option>
        </select>

        <label>Quantity:</label>
        <input type="number" id="quantity" value="1" min="1">

        <br><br>
        <button onclick="confirmOrder()">Confirm Order</button>
        <button class="close-btn" onclick="closePopup()">Cancel</button>
    </div>
</div>


<!-- ===== FOOTER ===== -->
<footer>
    <p>© 2026 FoodZone. All Rights Reserved.</p>
</footer>

<script src="../java/oder.js"></script>
</body>
</html>
